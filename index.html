<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تسجيل دور رواتب المتقاعدين - قطينة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <img src="logo.jpg" alt="البريد السوري">
    <h1>منصة تسجيل دور رواتب المتقاعدين - مكتب بريد قطينة</h1>
</div>

<div class="main-container">
    <div class="form-section">
        <div id="closedMessage" style="display: none; text-align: center; padding: 40px 20px; background: #fff3f3; color: #c0392b; border: 2px solid #e74c3c; border-radius: 12px;">
            <h2 style="margin-top:0;">⚠️ تنبيه</h2>
            <p style="font-size: 18px; font-weight: bold; line-height: 1.6;">
                نعتذر من السادة المتقاعدين، التسجيل متوقف حالياً.<br>
                يرجى مراجعة المنصة في وقت لاحق.
            </p>
        </div>

        <div id="registrationForm" style="display:none;">
            <h2>تسجيل دور جديد</h2>
            <form id="queueForm">
                <div class="form-group"><label>الاسم الثلاثي:</label><input type="text" name="name" required></div>
                <div class="form-group"><label>اسم الأم:</label><input type="text" name="motherName" required></div>
                <div class="form-group"><label>الرقم الوطني:</label><input type="text" name="nationalId" required></div>
                <div class="form-group"><label>الرقم التأميني:</label><input type="text" name="insuranceId" required></div>
                <div class="form-group"><label>رقم الهاتف:</label><input type="text" name="phone" required></div>
                <div class="form-group radio-group">
                    <label>الجنس:</label>
                    <input type="radio" name="gender" value="ذكر" required> ذكر
                    <input type="radio" name="gender" value="أنثى" required> أنثى
                </div>
                <div class="form-group"><label>نوع الراتب:</label>
                    <div class="pension-type-group">
                        <label><input type="radio" name="pensionType" value="اجتماعية" required> تأمينات اجتماعية</label>
                        <label><input type="radio" name="pensionType" value="معاشات" required> تأمينات ومعاشات</label>
                    </div>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">تسجيل الدور</button>
            </form>
            <div id="resultCard" class="result-card"><h3>تم بنجاح! رقمك: <span id="qNum"></span></h3></div>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbw_CbEKjpBTfvNpZn5VhWSimqlo9t3vA7eJQiogppUMHYKrgaQrA80edBeY4zQIYcqihA/exec';

    function fetchStatus() {
        fetch(scriptURL + "?action=getPublicData")
        .then(res => res.json())
        .then(data => {
            if(data.registrationStatus === "مغلق") {
                document.getElementById('closedMessage').style.display = 'block';
                document.getElementById('registrationForm').style.display = 'none';
            } else {
                document.getElementById('closedMessage').style.display = 'none';
                document.getElementById('registrationForm').style.display = 'block';
            }
            // استدعاء دالة رسم الجداول (تستخدم كود النسخة السابقة نفسه)
        });
    }
    window.onload = fetchStatus;
    // ... بقية دوال التسجيل والجداول من النسخة السابقة ...
</script>
</body>
</html>
