<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الموظف المبرمجة - بريد قطينة</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #2c3e50; color: white; text-align: center; margin: 0; padding: 20px; }
        .admin-box { background: white; color: #333; max-width: 950px; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* تنسيق الساعة الرقمية */
        #digitalClock { font-size: 32px; font-weight: bold; background: #34495e; color: #f1c40f; padding: 10px; border-radius: 8px; display: inline-block; margin-bottom: 20px; font-family: 'Courier New', Courier, monospace; border: 2px solid #f39c12; }
        
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; padding: 15px; background: #ecf0f1; border-radius: 8px; }
        .control-group { border: 1px solid #bdc3c7; padding: 10px; border-radius: 5px; background: white;}
        .btn { padding: 10px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; margin: 5px; }
        .btn-green { background-color: #27ae60; } .btn-red { background-color: #e74c3c; } .btn-blue { background-color: #2980b9; } .btn-orange { background-color: #d35400; } .btn-brown { background-color: #795548; }
        .btn-purple { background-color: #8e44ad; width: 100%; margin-top: 10px; font-size: 15px;}
        
        .scheduler-section { background: #fff3e0; border: 2px dashed #e67e22; padding: 10px; border-radius: 8px; margin-top: 15px; }
        .info-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 6px; }
        .copy-btn { background: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 4px; cursor: pointer; padding: 3px 8px; font-size: 11px; font-weight: bold;}
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px;}
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #34495e; color: white; }
        .status-msg { font-size: 14px; font-weight: bold; color: #c0392b; margin: 5px 0; }
    </style>
</head>
<body>

    <div class="admin-box">
        <div id="digitalClock">00:00:00</div>
        <h2>لوحة عمليات الموظف المجدولة</h2>
        
        <div id="loginSection">
            <input type="password" id="adminPass" placeholder="كلمة المرور" style="padding:10px; width:70%; text-align:center;">
            <br><button class="btn btn-blue" onclick="loadDashboard()">دخول 🔓</button>
        </div>

        <div id="dashboard" style="display:none;">
            <div class="controls-grid">
                <div class="control-group">
                    <h3>تحكم الموقع والجدولة</h3>
                    <button class="btn btn-green" onclick="changeSetting('siteStatus', 'مفتوح')">فتح التسجيل الآن</button>
                    <button class="btn btn-red" onclick="changeSetting('siteStatus', 'مغلق')">إغلاق التسجيل فوراً</button>
                    
                    <div class="scheduler-section">
                        <strong>📅 جدولة فتح الموقع تلقائياً:</strong><br>
                        <input type="datetime-local" id="scheduleTime" style="padding:8px; margin-top:8px; border-radius:5px; border:1px solid #ccc;">
                        <br>
                        <button class="btn btn-orange" onclick="setSchedule()">اعتمد الجدولة 🕒</button>
                        <button class="btn btn-red" style="padding:5px 10px; font-size:11px;" onclick="cancelSchedule()">إلغاء الجدولة ✖️</button>
                        <div id="scheduleStatus" class="status-msg">لا توجد جدولة حالية</div>
                    </div>
                </div>
                
                <div class="control-group">
                    <h3>تصفير وتفعيل الرواتب</h3>
                    <button class="btn btn-green" onclick="changeSetting('socStatus', 'active')">تفعيل الاجتماعية</button>
                    <button class="btn btn-orange" onclick="changeSetting('socStatus', 'suspended')">تعليق الاجتماعية</button>
                    <br>
                    <button class="btn btn-green" onclick="changeSetting('penStatus', 'active')">تفعيل المعاشات</button>
                    <button class="btn btn-orange" onclick="changeSetting('penStatus', 'suspended')">تعليق المعاشات</button>
                    <button class="btn btn-purple" onclick="resetQueue()">🔄 تصفير العداد لليوم الجديد</button>
                </div>
            </div>

            <div style="margin-top: 15px; background: #eee; padding: 10px; border-radius: 5px;">
                <strong>إعدادات النسخ:</strong> 
                <button id="numFormatBtn" class="btn" onclick="toggleNumberFormat()" style="background: #e67e22;">أرقام الهوية بالعربي (١٢٣)</button>
                <button class="btn btn-blue" onclick="loadDashboard()">تحديث القائمة 🔄</button>
            </div>
            
            <table id="adminTable">
                <thead><tr><th>الرقم</th><th>الاسم والتسجيل</th><th>التحقق (هوية/تأمين/هاتف)</th><th>النوع</th><th>إجراء</th></tr></thead>
                <tbody id="employeeTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbw_CbEKjpBTfvNpZn5VhWSimqlo9t3vA7eJQiogppUMHYKrgaQrA80edBeY4zQIYcqihA/exec';
        let currentPassword = '', currentAdminData = [], isArabicNumbers = true;

        // تشغيل الساعة الرقمية
        setInterval(() => {
            const now = new Date();
            document.getElementById('digitalClock').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
        }, 1000);

        function loadDashboard() {
            const passInput = document.getElementById('adminPass').value;
            let formData = new FormData();
            formData.append('action', 'getAdminData');
            formData.append('password', passInput);

            fetch(scriptURL, { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.status === "error") { alert("كلمة المرور خاطئة!"); }
                else {
                    currentPassword = passInput;
                    currentAdminData = data.activeQueue;
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    
                    // تحديث نص الجدولة
                    const statusBox = document.getElementById('scheduleStatus');
                    if(data.scheduledOpen && data.scheduledOpen !== "") {
                        statusBox.innerText = "⚠️ الموقع سيفتح تلقائياً في: " + new Date(data.scheduledOpen).toLocaleString('ar-SY');
                        statusBox.style.color = "#d35400";
                    } else {
                        statusBox.innerText = "لا توجد جدولة حالية";
                        statusBox.style.color = "#7f8c8d";
                    }
                    renderEmployeeTable(currentAdminData);
                }
            });
        }

        function setSchedule() {
            const timeVal = document.getElementById('scheduleTime').value;
            if(!timeVal) { alert("يرجى اختيار الوقت أولاً!"); return; }
            if(new Date(timeVal) <= new Date()) { alert("يجب اختيار وقت في المستقبل!"); return; }
            changeSetting('scheduleOpen', timeVal);
        }

        function cancelSchedule() {
            if(confirm("هل تريد إلغاء فتح الموقع التلقائي؟")) changeSetting('scheduleOpen', "");
        }

        function toggleNumberFormat() {
            isArabicNumbers = !isArabicNumbers;
            document.getElementById('numFormatBtn').innerText = isArabicNumbers ? "أرقام الهوية بالعربي (١٢٣)" : "أرقام الهوية بالانجليزي (123)";
            renderEmployeeTable(currentAdminData); 
        }

        function convertNumbers(numStr) {
            if (!numStr || !isArabicNumbers) return numStr; 
            const arabicNums = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
            return String(numStr).replace(/[0-9]/g, w => arabicNums[w]);
        }

        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const old = btn.innerText; btn.innerText = "✅";
                setTimeout(() => btn.innerText = old, 1000);
            });
        }

        function renderEmployeeTable(queue) {
            const tbody = document.getElementById('employeeTableBody');
            tbody.innerHTML = '';
            queue.forEach(row => {
                const tr = document.createElement('tr');
                if(row.status === 'absent') tr.style.backgroundColor = '#f6eee3';
                let dNat = convertNumbers(row.nationalId), dIns = convertNumbers(row.insuranceId);
                tr.innerHTML = `
                    <td><h2>${row.id}</h2></td>
                    <td><strong>${row.name}</strong><br><small>${row.time}</small></td>
                    <td>
                        <div class="info-row">هوية: ${dNat} <button class="copy-btn" onclick="copyText('${dNat}', this)">📋</button></div>
                        <div class="info-row">تأمين: ${dIns} <button class="copy-btn" onclick="copyText('${dIns}', this)">📋</button></div>
                    </td>
                    <td>${row.type}</td>
                    <td>
                        <button class="btn btn-green" onclick="markPaid(${row.rowIndex})">استلم</button>
                        <button class="btn btn-brown" onclick="markAbsent(${row.rowIndex})">غائب</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function changeSetting(name, val) {
            let formData = new FormData();
            formData.append('action', 'updateSettings');
            formData.append('password', currentPassword);
            formData.append('settingName', name);
            formData.append('newValue', val);
            fetch(scriptURL, { method: 'POST', body: formData }).then(() => loadDashboard());
        }

        function markPaid(idx) { if(confirm("تم استلام الراتب؟")) { let f=new FormData(); f.append('action','markPaid'); f.append('password',currentPassword); f.append('rowIndex',idx); fetch(scriptURL,{method:'POST',body:f}).then(()=>loadDashboard()); } }
        function markAbsent(idx) { if(confirm("تأجيل كغائب؟")) { let f=new FormData(); f.append('action','markAbsent'); f.append('password',currentPassword); f.append('rowIndex',idx); fetch(scriptURL,{method:'POST',body:f}).then(()=>loadDashboard()); } }
        function resetQueue() { if(confirm("تصفير العداد؟")) changeSetting('resetTime', new Date().toISOString()); }
    </script>
</body>
</html>
